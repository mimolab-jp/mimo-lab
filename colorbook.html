<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>色見本帳 | みもLAB</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app">
    <header class="app-header">
      <a href="index.html" class="back-link">← ホームへ戻る</a>
      <h1>🎨 色見本帳</h1>
      <p class="page-lead">みもLABの色・カード・ボタンを試す場所。</p>
    </header>

    <section class="sample-section">
      <h2>背景色</h2>

      <div class="sample-grid">
        <div class="sample-card">
          <div class="color-swatch bg-1"></div>
          <p class="color-code">#fff7fa</p>
          <p>現在の背景</p>
        </div>

        <div class="sample-card">
          <div class="color-swatch bg-2"></div>
          <p class="color-code">#fff9fb</p>
          <p>少し明るい桜色</p>
        </div>

        <div class="sample-card">
          <div class="color-swatch bg-3"></div>
          <p class="color-code">#fffafc</p>
          <p>かなり淡い桜色</p>
        </div>
      </div>
    </section>

    <section class="sample-section">
      <h2>文字色</h2>

      <div class="sample-grid">
        <div class="sample-card selected">
          <div class="color-swatch text-1"></div>
          <p class="color-code">#4d4543</p>
          <p>茶色寄りグレー</p>
        </div>

        <div class="sample-card">
          <div class="color-swatch text-2"></div>
          <p class="color-code">#564c49</p>
          <p>少し濃いブラウン</p>
        </div>

        <div class="sample-card">
          <div class="color-swatch text-3"></div>
          <p class="color-code">#746b68</p>
          <p>サブ文字向き</p>
        </div>
      </div>
    </section>

    <section class="sample-section">
      <h2>カードの角丸</h2>

      <div class="sample-grid">
        <div class="sample-card radius-20">
          <h3>角丸20px</h3>
          <p>少しきちんと感。</p>
        </div>

        <div class="sample-card radius-24 selected">
          <h3>角丸24px</h3>
          <p>現在の基本カード。</p>
        </div>

        <div class="sample-card radius-28">
          <h3>角丸28px</h3>
          <p>よりふんわり。</p>
        </div>
      </div>
    </section>

    <section class="sample-section">
      <h2>ボタン</h2>

      <div class="sample-grid">
        <div class="sample-card">
          <button class="sample-button pill">丸型ボタン</button>
          <p>やさしい印象。</p>
        </div>

        <div class="sample-card">
          <button class="sample-button square">角丸ボタン</button>
          <p>アプリっぽい。</p>
        </div>

        <div class="sample-card">
          <button class="sample-button outline">枠線ボタン</button>
          <p>控えめな操作。</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
