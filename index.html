    <div class="weather-card">

    <div class="weather-main">
        <div id="weatherIcon" class="weather-icon">🌤️</div>

        <div class="current-temperature">
            <span id="currentTemp">--</span><span class="degree">℃</span>
        </div>
    </div>

    <div class="high-low">
        <span class="high-temp">
            ↑ <span id="maxTemp">--</span>℃
        </span>

        <span class="low-temp">
            ↓ <span id="minTemp">--</span>℃
        </span>
    </div>

    <div class="weather-location">
        📍 山形市
    </div>

    <div class="weather-details">
        <div>😊 体感 <span id="feelsLike">--</span>℃</div>
        <div>💧 湿度 <span id="humidity">--</span>%</div>
        <div>☔ 降水 <span id="rainChance">--</span>%</div>
    </div>

</div>
